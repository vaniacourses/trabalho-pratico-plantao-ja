services:
  mysql:
    image: mysql:8
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: plantao_ja
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  usuario-service:
    build: ./backend/plantao-ja-usuario-service
    container_name: usuario-service
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/plantao_ja?useTimezone=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: password
    networks:
      - app-network
    ports:
      - "8082:8082"

  hospital-service:
    build: ./backend/plantao-ja-hospital-service
    container_name: hospital-service
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/plantao_ja?useTimezone=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: password
    networks:
      - app-network
    ports:
      - "8081:8081"

  scraping-service:
    build: ./backend/plantao-ja-scraping-service
    container_name: scraping-service
    networks:
      - app-network

  plantao-service:
    build: 
      context: ./backend/plantao-ja-plantao-service 
      dockerfile: Dockerfile
    container_name: plantao-service
    ports:
      - "8888:8083"
    depends_on:
      mysql:
        condition: service_healthy
      hospital-service:
        condition: service_started
    environment:
    # ADICIONADO: Provedor de dados obrigatório para o Hibernate criar as tabelas de plantão no MySQL
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/plantao_ja?useTimezone=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: password
      # 💡 ADICIONADO: Força o Spring a carregar o driver correto do MySQL
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      # Mantido para conversar internamente com a porta do hospital
      HOSPITAL_API_URL: http://hospital-service:8081/hospital/
      # 💡 ADICIONE ESTAS DUAS LINHAS ABAIXO:
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"
    networks:
      - app-network
  
  gateway:
    build: ./backend/gateway
    container_name: gateway
    depends_on:
      - usuario-service
      - hospital-service
      - plantao-service
    networks:
      - app-network
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend/plantao-ja/plantao-ja
    container_name: frontend
    ports:
      - "5173:5173"
    networks:
      - app-network
      
networks:
  app-network:
    driver: bridge