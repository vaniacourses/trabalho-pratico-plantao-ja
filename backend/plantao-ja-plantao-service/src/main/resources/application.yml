server:
  port: 8083

spring:
  # Configuração para o Spring Boot saber como se conectar ao MySQL
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/plantao_ja?useTimezone=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # 💡 O BLOCO QUE FALTAVA: Força a criação automática das tabelas
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

# Mantém a configuração de comunicação com o Hospital que você já tinha
hospital:
  url: ${HOSPITAL_API_URL:http://hospital-service:8081/hospital/}